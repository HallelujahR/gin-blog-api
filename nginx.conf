# Blog Nginx 配置
# 使用方法：
#   1. 将此文件复制到 /etc/nginx/conf.d/blog.conf
#   2. 确保 /etc/nginx/nginx.conf 的 http {} 块中包含以下内容：
#      proxy_cache_path /var/cache/nginx/blog levels=1:2 keys_zone=blog_cache:10m max_size=100m inactive=60m;
#   3. nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com;  # 替换为你的域名或 IP

    # ========== 全局 Gzip 压缩（最大收益） ==========
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ========== 前端 Vue SPA 静态文件 ==========
    root /www/wwwroot/blog/front/dist;  # 替换为 vue build 产物的实际路径
    index index.html;

    # 带 hash 的静态资源（JS/CSS/图片）—— 长期缓存
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # favicon 等根目录静态文件
    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ========== 上传文件（图片等） ==========
    location /uploads {
        alias /www/wwwroot/blog/api/uploads;  # 替换为实际路径

        # 图片不需要 gzip（已经是压缩格式，gzip 反而浪费 CPU）
        gzip off;

        # 浏览器缓存 30 天
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ========== API 反向代理 ==========
    location /api {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 支持 WebSocket（图片压缩等功能需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;

        # Nginx 层缓存 —— 仅缓存 GET 请求
        proxy_cache blog_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_valid 404 1m;
        proxy_cache_methods GET HEAD;
        proxy_cache_bypass $http_authorization;  # 登录用户不走缓存
        add_header X-Cache-Status $upstream_cache_status;

        # 限制请求体大小（上传文件）
        client_max_body_size 20m;

        access_log /var/log/nginx/blog_api.log;
    }

    # ========== SSE 流式接口（图片压缩进度等） ==========
    location ~ ^/api/.*/stream {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";

        # SSE 需要关闭缓冲
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        proxy_read_timeout 300s;
        access_log off;
    }

    # ========== 健康检查 ==========
    location /health {
        proxy_pass http://127.0.0.1:8080;
        access_log off;
    }

    # ========== Vue SPA 路由回退（必须放最后） ==========
    location / {
        try_files $uri $uri/ /index.html;

        # index.html 不缓存（确保更新后立即生效）
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }
    }

    # ========== 安全头 ==========
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
